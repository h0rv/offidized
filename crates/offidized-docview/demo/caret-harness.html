<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>offidized-docview caret harness</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #f1f3f4;
        color: #202124;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #fff;
        border-bottom: 1px solid #dadce0;
      }
      .toolbar button {
        border: 1px solid #dadce0;
        border-radius: 6px;
        padding: 6px 10px;
        background: #fff;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #f8f9fa;
      }
      .toolbar .primary {
        border-color: #1a73e8;
        background: #1a73e8;
        color: #fff;
      }
      .status {
        margin-left: auto;
        font-size: 12px;
        color: #5f6368;
      }
      #editor-container {
        height: 70vh;
        overflow: auto;
        background: #f1f3f4;
      }
      .panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 8px 12px 12px;
      }
      #summary,
      #log {
        margin: 0;
        min-height: 220px;
        max-height: 260px;
        overflow: auto;
        border: 1px solid #dadce0;
        border-radius: 8px;
        background: #fff;
        padding: 10px;
        font:
          12px/1.45 ui-monospace,
          "SFMono-Regular",
          Menlo,
          monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="btn-load">Load Blank</button>
      <button id="btn-click">Click First Page</button>
      <button id="btn-type">Type Burst</button>
      <button id="btn-scenario" class="primary">Run Repro Scenario</button>
      <button id="btn-export">Export Telemetry</button>
      <button id="btn-clear">Clear Logs</button>
      <span id="status" class="status">booting...</span>
    </div>

    <div id="editor-container"></div>

    <div class="panel">
      <pre id="summary">summary pending...</pre>
      <pre id="log"></pre>
    </div>

    <script type="module" src="./caret-harness.ts"></script>
  </body>
</html>
