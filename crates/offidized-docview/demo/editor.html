<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>offidized-docview editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f1f3f4;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: #fff;
        border-bottom: 1px solid #dadce0;
        flex-shrink: 0;
        box-shadow: 0 1px 2px rgba(60, 64, 67, 0.1);
        z-index: 10;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-gutter: stable both-edges;
        -webkit-overflow-scrolling: touch;
      }

      .toolbar > * {
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .toolbar h1 {
        font-size: 15px;
        font-weight: 600;
        color: #202124;
        margin-right: auto;
        letter-spacing: -0.2px;
      }

      .toolbar button {
        padding: 6px 14px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
        color: #3c4043;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .toolbar button:hover {
        background: #f1f3f4;
        border-color: #c6c6c6;
      }
      .toolbar button.active {
        background: #1a73e8;
        color: #fff;
        border-color: #1a73e8;
      }

      .toolbar label {
        padding: 6px 14px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
        color: #3c4043;
        transition: background 0.15s;
      }
      .toolbar label:hover {
        background: #f1f3f4;
      }

      #file-input {
        display: none;
      }

      .status {
        font-size: 12px;
        color: #5f6368;
      }

      .dirty-indicator {
        font-size: 12px;
        color: #ea4335;
        font-weight: 600;
        display: none;
      }
      .dirty-indicator.visible {
        display: inline;
      }

      .collab-info {
        font-size: 12px;
        color: #1a73e8;
        font-weight: 600;
        font-family: monospace;
      }

      /* Format toolbar */
      .format-bar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 16px;
        background: #fff;
        border-bottom: 1px solid #dadce0;
        flex-shrink: 0;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-gutter: stable both-edges;
        -webkit-overflow-scrolling: touch;
      }

      .format-bar > * {
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .format-bar .sep {
        width: 1px;
        height: 20px;
        background: #dadce0;
        margin: 0 6px;
      }

      .format-bar button {
        min-width: 32px;
        width: auto;
        height: 32px;
        padding: 0 10px;
        border: none;
        border-radius: 4px;
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        color: #444;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.1s;
      }
      .format-bar button:hover {
        background: #f1f3f4;
      }
      .format-bar button:active {
        background: #e8eaed;
      }
      .format-bar button.active {
        background: #d3e3fd;
        color: #1a73e8;
      }

      .format-bar select,
      .format-bar input[type="color"] {
        height: 32px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        background: #fff;
        color: #3c4043;
      }

      .format-bar select {
        padding: 0 10px;
        font-size: 13px;
      }

      .format-bar input[type="color"] {
        width: 40px;
        padding: 4px;
        cursor: pointer;
      }

      .format-bar .control-label {
        font-size: 12px;
        color: #5f6368;
        padding-left: 4px;
      }

      /* Editor container */
      #editor-container {
        flex: 1;
        overflow: auto;
        background: #f1f3f4;
      }

      /* Drop zone overlay */
      .drop-overlay {
        position: fixed;
        inset: 0;
        background: rgba(26, 115, 232, 0.08);
        border: 3px dashed #1a73e8;
        display: none;
        z-index: 100;
        pointer-events: none;
      }
      .drop-overlay.active {
        display: block;
      }

      /* Empty state */
      .empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #80868b;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <h1>offidized-docview editor</h1>
      <button id="btn-new">New</button>
      <label for="file-input">Open .docx</label>
      <input type="file" id="file-input" accept=".docx" />
      <button id="btn-save">Save</button>
      <span class="dirty-indicator" id="dirty-indicator">unsaved</span>
      <span class="status" id="status"></span>
      <div
        class="sep"
        style="width: 1px; height: 20px; background: #dadce0; margin: 0 4px"
      ></div>
      <button id="btn-renderer-html" title="HTML renderer">HTML</button>
      <button id="btn-renderer-canvas" title="Canvas renderer">Canvas</button>
      <span class="status" id="renderer-status"></span>
      <div
        class="sep"
        style="width: 1px; height: 20px; background: #dadce0; margin: 0 4px"
      ></div>
      <button id="btn-collab">Collab</button>
      <span class="collab-info" id="collab-info" style="display: none"></span>
    </div>

    <div class="format-bar" id="format-bar">
      <select id="fmt-block" title="Paragraph style">
        <option value="paragraph">Text</option>
        <option value="heading1">Heading 1</option>
        <option value="heading2">Heading 2</option>
        <option value="heading3">Heading 3</option>
      </select>
      <select id="fmt-font-family" title="Font family">
        <option value="">Default font</option>
        <option value="PT Sans">Sans</option>
        <option value="PT Serif">Serif</option>
        <option value="PT Mono">Mono</option>
        <option value="Comic Sans MS">Comic</option>
      </select>
      <select id="fmt-font-size" title="Font size">
        <option value="">Default size</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
        <option value="14">14</option>
        <option value="16">16</option>
        <option value="18">18</option>
        <option value="24">24</option>
        <option value="32">32</option>
      </select>
      <select id="fmt-align" title="Paragraph alignment">
        <option value="">Align</option>
        <option value="left">Left</option>
        <option value="center">Center</option>
        <option value="right">Right</option>
        <option value="justify">Justify</option>
      </select>
      <select id="fmt-space-before" title="Space before paragraph">
        <option value="">Before</option>
        <option value="0">Before 0</option>
        <option value="6">Before 6</option>
        <option value="12">Before 12</option>
        <option value="18">Before 18</option>
        <option value="24">Before 24</option>
      </select>
      <select id="fmt-space-after" title="Space after paragraph">
        <option value="">After</option>
        <option value="0">After 0</option>
        <option value="6">After 6</option>
        <option value="12">After 12</option>
        <option value="18">After 18</option>
        <option value="24">After 24</option>
      </select>
      <select id="fmt-line-spacing" title="Line spacing">
        <option value="">Line</option>
        <option value="1">1.0</option>
        <option value="1.15">1.15</option>
        <option value="1.5">1.5</option>
        <option value="2">2.0</option>
      </select>
      <select id="fmt-indent-left" title="Left indent">
        <option value="">Left indent</option>
        <option value="0">Left 0</option>
        <option value="18">Left 18</option>
        <option value="36">Left 36</option>
        <option value="54">Left 54</option>
      </select>
      <select id="fmt-indent-first-line" title="First line indent">
        <option value="">First line</option>
        <option value="0">First 0</option>
        <option value="18">First 18</option>
        <option value="36">First 36</option>
      </select>
      <select id="fmt-highlight" title="Text highlight">
        <option value="">Highlight</option>
        <option value="yellow">Yellow</option>
        <option value="green">Green</option>
        <option value="cyan">Cyan</option>
        <option value="red">Red</option>
        <option value="magenta">Magenta</option>
        <option value="blue">Blue</option>
        <option value="none">None</option>
      </select>
      <span class="control-label">Color</span>
      <input id="fmt-color" type="color" title="Text color" value="#000000" />
      <div class="sep"></div>
      <button id="fmt-bullet" title="Bulleted list">•</button>
      <button id="fmt-numbered" title="Numbered list">1.</button>
      <button id="fmt-table" title="Insert 3x3 table">Table</button>
      <button id="fmt-table-row-add" title="Insert row after current row">
        Row+
      </button>
      <button id="fmt-table-row-remove" title="Remove current row">Row-</button>
      <button id="fmt-table-col-add" title="Insert column after current column">
        Col+
      </button>
      <button id="fmt-table-col-remove" title="Remove current column">
        Col-
      </button>
      <button id="fmt-image" title="Insert inline image">Image</button>
      <input
        type="file"
        id="image-input"
        accept="image/*"
        style="display: none"
      />
      <div class="sep"></div>
      <button id="fmt-bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button id="fmt-italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button id="fmt-link" title="Link">Link</button>
      <button
        id="fmt-underline"
        title="Underline (Ctrl+U)"
        style="text-decoration: underline"
      >
        U
      </button>
      <button
        id="fmt-strike"
        title="Strikethrough"
        style="text-decoration: line-through"
      >
        S
      </button>
    </div>

    <div id="editor-container">
      <div class="empty-state" id="empty-state">
        Drop a .docx file here or click "Open .docx"
      </div>
    </div>

    <div class="drop-overlay" id="drop-overlay"></div>

    <script type="module" src="./editor-demo.ts"></script>
  </body>
</html>
