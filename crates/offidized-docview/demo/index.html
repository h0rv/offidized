<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>offidized-docview</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f0f0f0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: #fff;
        border-bottom: 1px solid #dadce0;
        flex-shrink: 0;
        box-shadow: 0 1px 2px rgba(60, 64, 67, 0.1);
        z-index: 10;
      }

      .toolbar h1 {
        font-size: 15px;
        font-weight: 600;
        color: #202124;
        margin-right: auto;
        letter-spacing: -0.2px;
      }

      .toolbar button {
        padding: 6px 14px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
        color: #3c4043;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .toolbar button:hover {
        background: #f1f3f4;
        border-color: #c6c6c6;
      }
      .toolbar button.active {
        background: #1a73e8;
        color: #fff;
        border-color: #1a73e8;
      }
      .toolbar button.active:hover {
        background: #1765cc;
      }

      .toolbar label {
        padding: 6px 14px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-size: 13px;
        color: #3c4043;
        transition: background 0.15s;
      }
      .toolbar label:hover {
        background: #f1f3f4;
      }

      #file-input {
        display: none;
      }

      .status {
        font-size: 12px;
        color: #5f6368;
      }

      /* Viewer */
      #viewer-container {
        flex: 1;
        overflow: auto;
        background: #f0f0f0;
      }

      /* Drop zone overlay */
      .drop-overlay {
        position: fixed;
        inset: 0;
        background: rgba(26, 115, 232, 0.08);
        border: 3px dashed #1a73e8;
        display: none;
        z-index: 100;
        pointer-events: none;
      }
      .drop-overlay.active {
        display: block;
      }

      /* Empty state */
      .empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #80868b;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <h1>offidized-docview</h1>
      <label for="file-input">Open .docx</label>
      <input type="file" id="file-input" accept=".docx" />
      <button id="btn-continuous">Continuous</button>
      <button id="btn-paginated" class="active">Paginated</button>
      <span class="status" id="status"></span>
    </div>

    <div id="viewer-container">
      <div class="empty-state" id="empty-state">
        Drop a .docx file here or click "Open .docx"
      </div>
    </div>

    <div class="drop-overlay" id="drop-overlay"></div>

    <script type="module" src="./viewer.ts"></script>
  </body>
</html>
