<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>offidized-xlview editor - Edit XLSX</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family:
          "Roboto",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f5f5;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        flex-shrink: 0;
        background: #fff;
        border-bottom: 1px solid #ddd;
      }

      h1 {
        margin: 0;
        color: #333;
        font-size: 20px;
      }

      h1 span {
        color: #4285f4;
        font-weight: 400;
        font-size: 14px;
        margin-left: 4px;
      }

      .upload-btn {
        padding: 6px 14px;
        cursor: pointer;
        border: 1px dashed #999;
        border-radius: 4px;
        background: #fafafa;
        color: #666;
        font-size: 13px;
        transition:
          border-color 0.2s,
          background 0.2s;
      }

      .upload-btn:hover {
        border-color: #666;
        background: #f0f0f0;
      }

      .upload-btn.dragover {
        border-color: #4caf50;
        background: #e8f5e9;
      }

      .upload-btn input {
        display: none;
      }

      .toolbar-btn {
        padding: 6px 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        color: #333;
        font-size: 13px;
        font-weight: 500;
        transition:
          background 0.2s,
          border-color 0.2s;
      }

      .toolbar-btn:hover:not(:disabled) {
        background: #f0f0f0;
        border-color: #999;
      }

      .toolbar-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      #save-btn {
        padding: 6px 16px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        background: #4285f4;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        transition:
          background 0.2s,
          opacity 0.2s;
        opacity: 0.5;
      }

      #save-btn:not(:disabled):hover {
        background: #3367d6;
      }

      #dirty-badge {
        display: none;
        background: #ff9800;
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 10px;
      }

      .toolbar-separator {
        width: 1px;
        height: 24px;
        background: #ddd;
        margin: 0 4px;
      }

      #test-files {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
        padding: 6px 16px;
        background: #fafafa;
        border-bottom: 1px solid #eee;
      }

      #test-files button {
        padding: 6px 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        font-size: 12px;
      }

      #formula-bar {
        display: flex;
        align-items: center;
        border-bottom: 1px solid #ddd;
        padding: 4px 8px;
        background: #fafafa;
        font-family: monospace;
        font-size: 13px;
        flex-shrink: 0;
      }

      #cell-ref {
        min-width: 60px;
        padding: 2px 8px;
        background: #e8e8e8;
        border: 1px solid #ccc;
        border-radius: 3px;
        margin-right: 8px;
        text-align: center;
      }

      #cell-content {
        flex: 1;
        padding: 2px 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #editor-container {
        background: #fff;
        border: none;
        overflow: hidden;
        flex: 1;
        min-height: 0;
        position: relative;
      }

      #editor-canvas,
      #editor-overlay {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        width: 100%;
        height: 100%;
      }

      #editor-overlay {
        pointer-events: none;
      }

      .error {
        color: #d32f2f;
        padding: 20px;
        background: #ffebee;
        border-radius: 4px;
        margin: 20px 0;
      }

      #tooltip {
        position: fixed;
        background: #ffffd0;
        border: 1px solid #c0c0a0;
        padding: 6px 10px;
        font-size: 12px;
        max-width: 300px;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.15);
        pointer-events: none;
        z-index: 1000;
        display: none;
        white-space: pre-wrap;
      }

      #sheet-tabs {
        display: flex;
        gap: 0;
        border-top: 1px solid #ccc;
        background: #f0f0f0;
        padding: 0 8px;
        flex-shrink: 0;
        overflow-x: auto;
      }

      .sheet-tab {
        padding: 6px 16px;
        border: 1px solid #ccc;
        border-top: none;
        border-bottom: 2px solid transparent;
        background: #e8e8e8;
        cursor: pointer;
        font-size: 13px;
        font-family: inherit;
        white-space: nowrap;
        transition: background 0.15s;
      }

      .sheet-tab:hover {
        background: #fff;
      }

      .sheet-tab.active {
        border-bottom: 2px solid #4285f4;
        background: #fff;
        font-weight: 600;
      }

      #keyboard-hints {
        padding: 4px 12px;
        font-size: 11px;
        color: #888;
        background: #f8f8f8;
        border-top: 1px solid #eee;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <!-- Toolbar -->
    <div class="header">
      <h1>offidized-xlview <span>editor</span></h1>
      <div class="toolbar-separator"></div>
      <label class="upload-btn" id="upload-area">
        <input type="file" id="file-input" accept=".xlsx,.xlsm,.csv,.tsv" />
        + Upload
      </label>
      <div class="toolbar-separator"></div>
      <button id="undo-btn" class="toolbar-btn" title="Undo (Ctrl+Z)" disabled>
        &#8617; Undo
      </button>
      <button
        id="redo-btn"
        class="toolbar-btn"
        title="Redo (Ctrl+Shift+Z)"
        disabled
      >
        &#8618; Redo
      </button>
      <div class="toolbar-separator"></div>
      <button id="save-btn" disabled>Save XLSX</button>
      <span id="dirty-badge">Unsaved changes</span>
    </div>

    <!-- Test file buttons -->
    <div id="test-files"></div>

    <!-- Formula bar -->
    <div id="formula-bar">
      <span id="cell-ref">A1</span>
      <span id="cell-content">&mdash;</span>
    </div>

    <!-- Editor canvas -->
    <div id="editor-container">
      <canvas id="editor-canvas"></canvas>
      <canvas id="editor-overlay"></canvas>
    </div>

    <!-- Sheet tabs -->
    <div id="sheet-tabs"></div>

    <!-- Keyboard hints -->
    <div id="keyboard-hints">
      Double-click to edit &middot; Enter/Tab to navigate &middot; Esc to cancel
      &middot; Ctrl+Z undo &middot; Ctrl+Shift+Z redo &middot; Ctrl+S save
    </div>

    <div id="tooltip"></div>

    <script type="module" src="src/demo/editor.js"></script>
  </body>
</html>
