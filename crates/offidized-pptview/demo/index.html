<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>offidized-pptview</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1e1e1e;
        display: flex;
        flex-direction: column;
        height: 100vh;
        color: #e0e0e0;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: #2d2d2d;
        border-bottom: 1px solid #3a3a3a;
        flex-shrink: 0;
        z-index: 10;
      }

      .toolbar h1 {
        font-size: 15px;
        font-weight: 600;
        color: #e0e0e0;
        margin-right: auto;
        letter-spacing: -0.2px;
      }

      .toolbar button {
        padding: 6px 14px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #3a3a3a;
        cursor: pointer;
        font-size: 13px;
        color: #e0e0e0;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .toolbar button:hover {
        background: #484848;
        border-color: #666;
      }
      .toolbar button:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .toolbar label {
        padding: 6px 14px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #3a3a3a;
        cursor: pointer;
        font-size: 13px;
        color: #e0e0e0;
        transition: background 0.15s;
      }
      .toolbar label:hover {
        background: #484848;
      }

      #file-input {
        display: none;
      }

      .slide-counter {
        font-size: 13px;
        color: #aaa;
        min-width: 60px;
        text-align: center;
      }

      .status {
        font-size: 12px;
        color: #888;
      }

      /* Viewer */
      #viewer-container {
        flex: 1;
        overflow: hidden;
      }

      /* Drop zone overlay */
      .drop-overlay {
        position: fixed;
        inset: 0;
        background: rgba(74, 158, 255, 0.08);
        border: 3px dashed #4a9eff;
        display: none;
        z-index: 100;
        pointer-events: none;
      }
      .drop-overlay.active {
        display: block;
      }

      /* Empty state */
      .empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #666;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <h1>offidized-pptview</h1>
      <label for="file-input">Open .pptx</label>
      <input type="file" id="file-input" accept=".pptx" />
      <button id="btn-prev" disabled>&larr;</button>
      <span class="slide-counter" id="slide-counter"></span>
      <button id="btn-next" disabled>&rarr;</button>
      <span class="status" id="status"></span>
    </div>

    <div id="viewer-container">
      <div class="empty-state" id="empty-state">
        Drop a .pptx file here or click "Open .pptx"
      </div>
    </div>

    <div class="drop-overlay" id="drop-overlay"></div>

    <script type="module" src="./viewer.ts"></script>
  </body>
</html>
