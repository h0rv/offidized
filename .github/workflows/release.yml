name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Run real publishes after the dry-run passes
        required: true
        type: boolean
        default: false
      publish_crates:
        description: Publish Rust crates to crates.io
        required: true
        type: boolean
        default: true
      publish_python:
        description: Publish Python bindings to PyPI
        required: true
        type: boolean
        default: true
      publish_npm:
        description: Publish wasm packages to npm
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  OFFIDIZED_OPENXML_DATA_ROOT: ${{ github.workspace }}/references/Open-XML-SDK/data

jobs:
  dry-run:
    name: Release Dry-Run
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: wasm32-unknown-unknown

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install release tools
        uses: taiki-e/install-action@v2
        with:
          tool: |
            just
            wasm-pack

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch Open-XML-SDK schema data
        run: just site-fetch-openxml-data

      - name: Validate release prerequisites
        run: just release requirements

      - name: Run full release dry-run
        run: just release dry-run

  publish:
    name: Publish Release
    needs: dry-run
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: release
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          targets: wasm32-unknown-unknown

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install release tools
        uses: taiki-e/install-action@v2
        with:
          tool: |
            just
            wasm-pack

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Fetch Open-XML-SDK schema data
        run: just site-fetch-openxml-data

      - name: Validate release prerequisites
        run: just release requirements

      - name: Publish crates.io packages
        if: ${{ inputs.publish_crates }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          just release auth-crates
          just release crates

      - name: Publish Python bindings
        if: ${{ inputs.publish_python }}
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
          MATURIN_PASSWORD: ${{ secrets.MATURIN_PASSWORD }}
          MATURIN_USERNAME: ${{ secrets.MATURIN_USERNAME }}
        run: |
          just release auth-python
          just release python

      - name: Publish npm packages
        if: ${{ inputs.publish_npm }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          just release auth-npm
          just release npm
